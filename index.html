<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Panduan Investasi Cerdas: Strategi di Tengah Krisis Geopolitik</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #d4af37;
            --primary-dark: #b8860b;
            --accent: #1a472a;
            --accent-light: #2d5a3d;
            --text-dark: #1a1a1a;
            --text-light: #f5f5f5;
            --border: #e8e8e8;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 30px 60px rgba(0, 0, 0, 0.15);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            line-height: 1.7;
            color: var(--text-dark);
            background: linear-gradient(135deg, #fafaf8 0%, #f5f3f0 100%);
            letter-spacing: 0.3px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* Header & Navigation */
        header {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: var(--text-light);
            padding: 20px 0;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, #e8c547 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        /* Desktop Navigation */
        nav {
            display: flex;
            gap: 35px;
            align-items: center;
            flex: 1;
            justify-content: flex-end;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        nav a i {
            font-size: 16px;
            transition: all 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: var(--primary);
        }

        nav a:hover::after {
            width: 100%;
        }

        nav a:hover i {
            transform: translateY(-2px);
            color: var(--primary);
        }

        /* Mobile Menu Toggle */
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 8px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .nav-toggle:hover {
            color: var(--primary);
            transform: scale(1.1);
        }

        .nav-toggle.active {
            color: var(--primary);
        }

        /* Mobile Sidebar Navigation */
        .nav-sidebar {
            display: none;
            position: fixed;
            top: 0;
            right: -100%;
            width: 280px;
            height: 100vh;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            flex-direction: column;
            padding: 80px 0 40px 0;
            z-index: 99;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -8px 0 32px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
        }

        .nav-sidebar.active {
            right: 0;
        }

        .nav-sidebar a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 16px 30px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 3px solid transparent;
            position: relative;
        }

        .nav-sidebar a i {
            font-size: 18px;
            width: 24px;
            text-align: center;
            color: var(--primary);
        }

        .nav-sidebar a:hover {
            background: rgba(212, 175, 55, 0.1);
            border-left-color: var(--primary);
            padding-left: 35px;
        }

        /* Mobile Overlay */
        .nav-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 98;
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .nav-overlay.active {
            display: block;
            opacity: 1;
            pointer-events: auto;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05) 0%, rgba(45, 90, 61, 0.05) 100%);
            padding: 100px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .hero .container {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            margin-bottom: 25px;
            color: var(--text-dark);
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .hero p {
            font-size: 18px;
            color: #666;
            max-width: 700px;
            margin: 0 auto 40px;
            font-weight: 400;
            line-height: 1.8;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, #e8c547 100%);
            color: var(--accent);
            padding: 16px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.4);
        }

        /* Main Content */
        main {
            padding: 80px 40px;
        }

        section {
            margin-bottom: 100px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            margin-bottom: 40px;
            color: var(--text-dark);
            font-weight: 800;
            letter-spacing: -0.5px;
            position: relative;
            padding-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        section h2 i {
            color: var(--primary);
            font-size: 42px;
        }

        section h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary) 0%, transparent 100%);
            border-radius: 2px;
        }

        section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin-top: 40px;
            margin-bottom: 20px;
            color: var(--text-dark);
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        section h3 i {
            color: var(--primary);
            font-size: 24px;
        }

        p {
            margin-bottom: 18px;
            font-size: 16px;
            line-height: 1.9;
            color: #444;
        }

        strong {
            color: var(--primary-dark);
            font-weight: 600;
        }

        /* Cards & Boxes */
        .card {
            background: white;
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary) 0%, transparent 100%);
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-6px);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .highlight-box {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.08) 0%, rgba(212, 175, 55, 0.03) 100%);
            border-left: 4px solid var(--primary);
            padding: 30px;
            border-radius: 12px;
            margin: 30px 0;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 15px;
        }

        .highlight-box i {
            color: var(--primary);
            font-size: 24px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .warning-box {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.08) 0%, rgba(220, 38, 38, 0.03) 100%);
            border-left: 4px solid #dc2626;
            padding: 30px;
            border-radius: 12px;
            margin: 30px 0;
            display: flex;
            gap: 15px;
        }

        .warning-box i {
            color: #dc2626;
            font-size: 24px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .info-box {
            background: linear-gradient(135deg, rgba(45, 90, 61, 0.08) 0%, rgba(45, 90, 61, 0.03) 100%);
            border-left: 4px solid var(--accent);
            padding: 30px;
            border-radius: 12px;
            margin: 30px 0;
            display: flex;
            gap: 15px;
        }

        .info-box i {
            color: var(--accent);
            font-size: 24px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin: 40px 0;
        }

        .stat-card {
            background: white;
            border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary) 0%, transparent 100%);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Comparison */
        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 40px 0;
        }

        .comparison-item {
            background: white;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .comparison-item:hover {
            transform: translateY(-6px);
        }

        .comparison-item.positive {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05) 0%, rgba(212, 175, 55, 0.02) 100%);
        }

        .comparison-item.negative {
            border-color: #dc2626;
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.05) 0%, rgba(220, 38, 38, 0.02) 100%);
        }

        .comparison-icon {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .comparison-item.positive .comparison-icon {
            color: var(--primary);
        }

        .comparison-item.negative .comparison-icon {
            color: #dc2626;
        }

        .comparison-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .comparison-value {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .comparison-item.negative .comparison-value {
            color: #dc2626;
        }

        /* Company Grid */
        .company-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .company-card {
            background: white;
            border: 2px solid rgba(212, 175, 55, 0.15);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .company-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary) 0%, transparent 100%);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .company-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
            transform: translateY(-8px);
        }

        .company-card:hover::before {
            transform: scaleX(1);
        }

        .company-icon {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .company-symbol {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .company-name {
            font-size: 15px;
            color: var(--text-dark);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .company-desc {
            font-size: 13px;
            line-height: 1.7;
            color: #777;
        }

        /* Footer */
        footer {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: var(--text-light);
            padding: 60px 40px;
            text-align: center;
            margin-top: 100px;
            border-top: 3px solid var(--primary);
        }

        footer p {
            color: rgba(245, 245, 245, 0.9);
            margin-bottom: 12px;
            font-size: 15px;
        }

        footer strong {
            color: var(--primary);
        }

        .footer-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--text-light);
            text-decoration: underline;
        }

        /* Responsive - Tablet */
        @media (max-width: 1024px) {
            .container {
                padding: 0 30px;
            }

            section h2 {
                font-size: 40px;
            }

            .hero h1 {
                font-size: 44px;
            }

            .comparison {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            nav {
                gap: 25px;
            }

            nav a {
                font-size: 13px;
            }
        }

        /* Responsive - Small Tablet & Mobile */
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            header .container {
                gap: 15px;
            }

            /* Hide desktop nav, show mobile toggle */
            nav {
                display: none;
            }

            .nav-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .nav-sidebar {
                display: flex;
            }

            .hero {
                padding: 60px 20px;
            }

            .hero h1 {
                font-size: 32px;
            }

            .hero p {
                font-size: 16px;
